name: GitHub CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  debug_unix:
    name: Debug ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x64
            runner: ubuntu-22.04
            with_optional: ON
            conda_pkgs: c-compiler cxx-compiler cmake ninja boost-cpp tbb tbb-devel eigen nlopt ipopt
          - label: linux-arm64
            runner: ubuntu-22.04-arm
            with_optional: OFF
            conda_pkgs: c-compiler cxx-compiler cmake ninja boost-cpp tbb tbb-devel eigen
          - label: macos-arm64
            runner: macos-latest
            with_optional: ON
            conda_pkgs: c-compiler cxx-compiler libcxx cmake ninja boost-cpp tbb tbb-devel eigen nlopt ipopt
    steps:
      - uses: actions/checkout@v4
      - uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          channels: conda-forge
          channel-priority: strict
      - name: Install dependencies
        shell: bash
        run: |
          set -e
          conda create -y -q -p "$HOME/local" ${{ matrix.conda_pkgs }}
      - name: Configure
        shell: bash
        run: |
          set -e
          conda run -p "$HOME/local" cmake -S . -B build -G Ninja \
            -DCMAKE_PREFIX_PATH="$HOME/local" \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBoost_NO_BOOST_CMAKE=ON \
            -DPAGMO_BUILD_TESTS=ON \
            -DPAGMO_WITH_EIGEN3=ON \
            -DPAGMO_WITH_NLOPT=${{ matrix.with_optional }} \
            -DPAGMO_WITH_IPOPT=${{ matrix.with_optional }} \
            -DPAGMO_ENABLE_IPO=ON
      - name: Build
        shell: bash
        run: |
          set -e
          conda run -p "$HOME/local" cmake --build build --parallel
      - name: Test
        shell: bash
        run: |
          set -e
          conda run -p "$HOME/local" ctest --test-dir build -VV --output-on-failure -j4

  debug_windows_x64:
    name: Debug windows-x64
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          channels: conda-forge
          channel-priority: strict
      - name: Configure
        shell: powershell
        run: |
          conda create -y -q -p $env:USERPROFILE\local cmake ninja eigen nlopt ipopt boost-cpp tbb tbb-devel
          conda run -p $env:USERPROFILE\local cmake -S . -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_PREFIX_PATH=$env:USERPROFILE\local `
            -DCMAKE_INSTALL_PREFIX=$env:USERPROFILE\local `
            -DBoost_NO_BOOST_CMAKE=ON `
            -DPAGMO_BUILD_TESTS=ON `
            -DPAGMO_WITH_EIGEN3=ON `
            -DPAGMO_WITH_NLOPT=ON `
            -DPAGMO_WITH_IPOPT=ON `
            -DPAGMO_ENABLE_IPO=ON
      - name: Build
        shell: powershell
        run: conda run -p $env:USERPROFILE\local cmake --build build --config Debug --parallel
      - name: Test
        shell: powershell
        run: conda run -p $env:USERPROFILE\local ctest --test-dir build -VV --output-on-failure -j4 -C Debug

  release_linux_x64:
    name: Release linux-x64
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          channels: conda-forge
          channel-priority: strict
      - name: Build and test
        shell: bash
        run: |
          set -e
          conda create -y -q -p "$HOME/local" c-compiler cxx-compiler cmake ninja boost-cpp tbb tbb-devel eigen nlopt ipopt
          conda run -p "$HOME/local" cmake -S . -B build -G Ninja \
            -DCMAKE_PREFIX_PATH="$HOME/local" \
            -DCMAKE_BUILD_TYPE=Release \
            -DBoost_NO_BOOST_CMAKE=ON \
            -DPAGMO_BUILD_TESTS=ON \
            -DPAGMO_WITH_EIGEN3=ON \
            -DPAGMO_WITH_NLOPT=ON \
            -DPAGMO_WITH_IPOPT=ON \
            -DPAGMO_ENABLE_IPO=ON
          conda run -p "$HOME/local" cmake --build build --parallel
          conda run -p "$HOME/local" ctest --test-dir build -VV --output-on-failure -j4

  coverage_linux_x64:
    name: Coverage linux-x64
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          channels: conda-forge
          channel-priority: strict
      - name: Build and test with coverage
        shell: bash
        run: |
          set -e
          conda create -y -q -p "$HOME/local" c-compiler cxx-compiler cmake ninja boost-cpp tbb tbb-devel eigen nlopt ipopt lcov
          conda run -p "$HOME/local" cmake -S . -B build -G Ninja \
            -DCMAKE_PREFIX_PATH="$HOME/local" \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBoost_NO_BOOST_CMAKE=ON \
            -DPAGMO_BUILD_TESTS=ON \
            -DPAGMO_WITH_EIGEN3=ON \
            -DPAGMO_WITH_NLOPT=ON \
            -DPAGMO_WITH_IPOPT=ON \
            -DPAGMO_ENABLE_IPO=ON \
            -DCMAKE_CXX_FLAGS="--coverage" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage"
          conda run -p "$HOME/local" cmake --build build --parallel
          # Coverage mode keeps torture tests disabled to contain runtime.
          conda run -p "$HOME/local" ctest --test-dir build -VV --output-on-failure -j4 -E torture
      - name: Generate lcov report
        shell: bash
        run: |
          set -e
          GCOV="$HOME/local/bin/gcov"
          conda run -p "$HOME/local" lcov \
            --gcov-tool "$GCOV" \
            --capture \
            --directory build \
            --output-file lcov.info \
            --no-external \
            --ignore-errors mismatch
          conda run -p "$HOME/local" lcov \
            --remove lcov.info \
            '*/tests/*' '*/tutorials/*' \
            '*/cec2013_data.cpp' '*/cec2014_data.cpp' \
            --output-file lcov.info
      - name: Upload coverage report
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: true
          verbose: true

  docs:
    name: Docs build${{ github.event_name == 'push' && github.ref == 'refs/heads/master' && ' and deploy' || '' }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          channels: conda-forge
          channel-priority: strict
      - name: Install dependencies
        shell: bash
        run: |
          set -e
          conda create -y -q -p "$HOME/local" \
            c-compiler cxx-compiler cmake ninja boost-cpp tbb tbb-devel eigen nlopt ipopt \
            python=3.10 sphinx=4.5.0 sphinx-book-theme breathe "doxygen<1.13" graphviz
      - name: Configure
        shell: bash
        run: |
          set -e
          conda run -p "$HOME/local" cmake -S . -B build -G Ninja \
            -DCMAKE_PREFIX_PATH="$HOME/local" \
            -DCMAKE_BUILD_TYPE=Release \
            -DBoost_NO_BOOST_CMAKE=ON \
            -DPAGMO_BUILD_TESTS=OFF \
            -DPAGMO_WITH_EIGEN3=ON \
            -DPAGMO_WITH_NLOPT=ON \
            -DPAGMO_WITH_IPOPT=ON \
            -DPAGMO_ENABLE_IPO=ON
      - name: Build Doxygen XML
        shell: bash
        run: |
          set -e
          cd doc/doxygen
          conda run -p "$HOME/local" doxygen
          cp images/* xml/
      - name: Build Sphinx docs
        shell: bash
        run: |
          set -e
          cd doc/sphinx
          conda run -p "$HOME/local" make html linkcheck
      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: doc/sphinx/_build/html
